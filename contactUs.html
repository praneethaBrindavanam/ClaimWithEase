<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact Us – Claim Ease</title>
  <link rel="icon" type="image/x-icon" href="assets/img/claim-ease.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="assets/css/shared.css" rel="stylesheet"/>
  <link href="assets/css/contactUs.css" rel="stylesheet"/>
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div class="toast-container" id="toastContainer"></div>

  <main>
    <section class="page-hero">
      <h1 class="fw-bold mb-2">Contact Us</h1>
      <p>We're here 24/7 to help you with anything.</p>
    </section>

    <div class="container py-5">
      <div class="row g-5">

        <!-- Contact Details -->
        <div class="col-md-6">
          <h5 class="fw-bold mb-4 section-title">Get in Touch</h5>

          <div class="contact-box">
            <i class="bi bi-download contact-icon"></i>
            <div class="contact-text">
              <small>Get Mobile App</small>
              <a href="#">Download on App Store / Play Store</a>
            </div>
          </div>

          <div class="contact-box">
            <i class="bi bi-headset contact-icon"></i>
            <div class="contact-text">
              <small>Call to Buy New Policy (Toll Free)</small>
              <a href="tel:18002676115">1800-267-6115</a>
            </div>
          </div>

          <div class="contact-box">
            <i class="bi bi-telephone contact-icon"></i>
            <div class="contact-text">
              <small>24/7 Customer Support (Charges Apply)</small>
              <a href="tel:02264898282">022-6489-8282</a>
            </div>
          </div>

          <div class="contact-box">
            <i class="bi bi-whatsapp contact-icon whatsapp-icon"></i>
            <div class="contact-text">
              <small>WhatsApp</small>
              <a href="https://wa.me/7075233910">+91-7075233910</a>
            </div>
          </div>

          <div class="contact-box">
            <i class="bi bi-envelope contact-icon"></i>
            <div class="contact-text">
              <small>Email Support</small>
              <a href="mailto:customersupport@ce.com">customersupport@ce.com</a>
            </div>
          </div>
        </div>

        <!-- Message Form -->
        <div class="col-md-6">
          <h5 class="fw-bold mb-4 section-title">Send Us a Message</h5>
          <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Your Name</label>
                <input type="text" class="form-control" id="contactName" placeholder="Full name"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control" id="contactEmail" placeholder="your@email.com"/>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Subject</label>
                <select class="form-select" id="contactSubject">
                  <option>Claim Status Enquiry</option>
                  <option>Policy Renewal</option>
                  <option>New Policy Purchase</option>
                  <option>Emergency Assistance</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Message</label>
                <textarea class="form-control" id="contactMsg" rows="4" placeholder="How can we help you?"></textarea>
              </div>
              <div class="col-12">
                <button class="btn btn-primary w-100 py-2 submit-btn" onclick="submitContact()">
                  <i class="bi bi-send me-2"></i>Send Message
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/contactUs.js"></script>
</body>
</html>
